name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short -x
        env:
          ANTHROPIC_API_KEY: test-key
          GITHUB_TOKEN: test-token

      - name: Lint
        run: uv run ruff check src/ tests/

  self-test:
    name: Run guardian on its own Terraform (dogfood)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Create a minimal test plan
        run: |
          cp tests/fixtures/plan_with_violations.json tfplan.json

      - name: Run terraform-ai-guardian (self-test)
        uses: ./
        id: guardian
        with:
          plan-file: tfplan.json
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-risk: CRITICAL  # Don't fail CI — test fixture intentionally has violations
          standards-file: standards.yaml
        continue-on-error: true

      - name: Verify outputs were set
        run: |
          echo "Risk: ${{ steps.guardian.outputs.risk-level }}"
          echo "Critical: ${{ steps.guardian.outputs.critical-count }}"
          test -n "${{ steps.guardian.outputs.risk-level }}"

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Action image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: terraform-ai-guardian:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
